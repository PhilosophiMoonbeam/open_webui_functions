shared_product_claims:
  store:
    decision: allow
    evidence: [interactions_supported, interactions_state, product_implementation, product_tests]
    reason: "Explicit store and same-scope continuation are implemented and tested for supported model interactions."
  files:
    decision: conditional_allow
    evidence: [file_input_methods, product_implementation, product_tests]
    reason: "Files transport is allowed only for a content modality established by the exact model page."
  external_urls:
    decision: conditional_allow
    evidence: [file_input_methods, product_implementation, product_tests]
    reason: "External URLs are allowed only for a content modality established by the exact model page; Gemini 2.0 exclusion is irrelevant to retained IDs."
  file_search:
    decision: deny
    evidence: [product_implementation, product_tests]
    reason: "Provider support does not imply product authorization; no file-search request implementation is exposed."
  safety_settings:
    decision: deny
    evidence: [interactions_supported, product_implementation, product_tests]
    reason: "Custom safety settings are an explicit Interactions limitation and were removed."

