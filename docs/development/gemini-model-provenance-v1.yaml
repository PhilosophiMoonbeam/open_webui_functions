artifact: gemini-interactions-model-claim-provenance
scope: developer-api
researched_at: "2026-07-14"
repository_commit: "a0fdd922acbce4357363635e41b338f101c20808"

evidence_policy:
  freshness_days: 30
  expires_after: "2026-08-13"
  on_expiry: deny_changed_or_unverifiable_claims_until_renewed
  source_precedence:
    - exact_interactions_supported_id_table
    - exact_model_property_page
    - exact_thinking_or_pricing_table_row
    - dated_lifecycle_changelog
    - generic_interactions_feature_guide
    - exact_sdk_2_11_wire_shape_only
  rules:
    - Interactions availability requires exact model-ID equality in interactions_supported.
    - Model pages establish lifecycle, modalities, limits, and provider capabilities only.
    - Thinking controls require an exact row in thinking_controls; general thinking support is insufficient.
    - Pricing requires the exact model ID, service tier, modality, cache state, and threshold semantics.
    - SDK types establish serialization shape only and never model availability or product authorization.
    - Product allow requires provider evidence, Interactions availability, implementation evidence, and policy review.
    - Missing, stale, conflicting, family-inferred, or alias-based evidence is unknown and denied.
  renewal_procedure:
    - Fetch every HTTP source at its canonical URL and record the raw-response SHA-256.
    - Compare published last-updated dates and exact table rows against this artifact.
    - Reconcile every retained, excluded, removed, denied, and unknown entry by exact ID.
    - Re-run the provenance tests before protocol or production catalog mutation.
    - Record the new retrieval date, source digests, repository commit, and Beads evidence.

