name: Python CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
    paths:
      - ".github/**"
      - "dev/**"
      - "docs/**"
      - "plugins/filters/**"
      - "plugins/pipes/**"
      - "release/**"
      - "tests/**"
      - "utils/**"
      - "Makefile"
      - "README.md"
      - ".python-version"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches: [master]
    paths:
      - ".github/**"
      - "dev/**"
      - "docs/**"
      - "plugins/filters/**"
      - "plugins/pipes/**"
      - "release/**"
      - "tests/**"
      - "utils/**"
      - "Makefile"
      - "README.md"
      - ".python-version"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canonical-check:
    name: Canonical make check (Linux / Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - name: Run read-only CI-equivalent gate
        run: make check

  pytest-matrix:
    name: Pytest (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest
