name: Python CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
    paths:
      - ".github/**"
      - "dev/**"
      - "docs/**"
      - "plugins/filters/**"
      - "plugins/pipes/**"
      - "release/**"
      - "tests/**"
      - "utils/**"
      - "Makefile"
      - "README.md"
      - ".gitattributes"
      - ".python-version"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches: [master]
    paths:
      - ".github/**"
      - "dev/**"
      - "docs/**"
      - "plugins/filters/**"
      - "plugins/pipes/**"
      - "release/**"
      - "tests/**"
      - "utils/**"
      - "Makefile"
      - "README.md"
      - ".gitattributes"
      - ".python-version"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canonical-check:
    name: Canonical make check (Linux / Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --locked
      - name: Run read-only CI-equivalent gate
        run: make check

  pytest-matrix:
    name: Pytest (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest
