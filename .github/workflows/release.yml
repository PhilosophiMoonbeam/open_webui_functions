name: Plugin Release

on:
  push:
    tags:
      - "*/v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse tag
        id: parse_tag
        run: .github/scripts/parse_tag.sh

      - name: Reject incompatible individual Gemini v3 releases
        env:
          PLUGIN_NAME: ${{ steps.parse_tag.outputs.plugin_name }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "${PLUGIN_NAME}" in
            gemini_manifold|gemini_manifold_google_genai|gemini_manifold_companion|gemini_reasoning_toggle|gemini_map_grounding_toggle|gemini_maps_grounding_toggle|gemini_url_context_toggle|gemini_paid_api|gemini_enterprise_toggle)
              echo "::error::Gemini suite components cannot be released individually; use gemini-suite/v3.0.0."
              exit 1
              ;;
            gemini-suite)
              if [[ "${RELEASE_TAG}" != "gemini-suite/v3.0.0" ]]; then
                echo "::error::No manifest exists for ${RELEASE_TAG}."
                exit 1
              fi
              ;;
          esac

      - name: Install uv for coordinated suite verification
        if: steps.parse_tag.outputs.plugin_name == 'gemini-suite'
        uses: astral-sh/setup-uv@v6

      - name: Synchronize locked release environment
        if: steps.parse_tag.outputs.plugin_name == 'gemini-suite'
        run: uv sync --locked

      - name: Build deterministic coordinated suite twice
        if: steps.parse_tag.outputs.plugin_name == 'gemini-suite'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          make check
          mkdir -p dist/repro
          uv run python .github/scripts/build_gemini_suite.py --manifest release/gemini-suite-v3.0.0.yaml --tag "${RELEASE_TAG}" --output dist/gemini-suite-v3.0.0.tar.gz
          uv run python .github/scripts/build_gemini_suite.py --manifest release/gemini-suite-v3.0.0.yaml --tag "${RELEASE_TAG}" --output dist/repro/gemini-suite-v3.0.0.tar.gz
          cmp dist/gemini-suite-v3.0.0.tar.gz dist/repro/gemini-suite-v3.0.0.tar.gz
          cp release/gemini-suite-v3.0.0.yaml dist/gemini-suite-v3.0.0.yaml
          (cd dist && sha256sum gemini-suite-v3.0.0.tar.gz gemini-suite-v3.0.0.yaml > SHA256SUMS)

      - name: Find individual plugin file
        if: steps.parse_tag.outputs.plugin_name != 'gemini-suite'
        id: find_plugin_file
        run: .github/scripts/find_plugin_file.sh
        env:
          PLUGIN_NAME: ${{ steps.parse_tag.outputs.plugin_name }}

      - name: Generate individual plugin changelog
        if: steps.parse_tag.outputs.plugin_name != 'gemini-suite'
        id: changelog
        run: .github/scripts/generate_changelog.sh
        env:
          PLUGIN_NAME: ${{ steps.parse_tag.outputs.plugin_name }}
          CURRENT_TAG: ${{ github.ref_name }}
          PLUGIN_PATH: ${{ steps.find_plugin_file.outputs.plugin_path }}

      - name: Create coordinated Gemini suite draft
        if: steps.parse_tag.outputs.plugin_name == 'gemini-suite'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Gemini suite 3.0.0
          body_path: release/gemini-suite-v3.0.0.md
          files: |
            dist/gemini-suite-v3.0.0.tar.gz
            dist/SHA256SUMS
            dist/gemini-suite-v3.0.0.yaml
          draft: true
          prerelease: ${{ steps.parse_tag.outputs.is_prerelease == 'true' }}

      - name: Create individual plugin draft
        if: steps.parse_tag.outputs.plugin_name != 'gemini-suite'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.parse_tag.outputs.plugin_name }} ${{ steps.parse_tag.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog_body }}
          files: ${{ steps.find_plugin_file.outputs.plugin_path }}
          draft: true
          prerelease: ${{ steps.parse_tag.outputs.is_prerelease == 'true' }}
